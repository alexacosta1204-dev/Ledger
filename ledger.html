// ---------- Summary page ----------
function SummaryPage({ transactions, allCategories, rateOverrides, goToCategory, goToCard, goToProject, setPage }) {
  if (transactions.length === 0) {
    return <div style={{ color: "#7A7365", fontSize: 14 }}>Upload some statements to see your compiled summary here.</div>;
  }

  const expenses = transactions.filter((t) => t.amount < 0);
  const income = transactions.filter((t) => t.amount > 0);
  const totalCharges = expenses.reduce((s, t) => s + -t.amount, 0);
  const totalPayments = income.reduce((s, t) => s + t.amount, 0);
  const avgCharge = expenses.length ? totalCharges / expenses.length : 0;
  const cardCount = new Set(transactions.map((t) => t.card || "Unlabeled")).size;

  const recurring = detectRecurring(transactions);
  const estMonthlyRecurring = recurring.reduce((s, r) => s + (r.frequency === "Monthly" ? r.avgAmount : r.estAnnual / 12), 0);

  const cardMap = {};
  transactions.forEach((t) => {
    const name = t.card || "Unlabeled";
    if (!cardMap[name]) cardMap[name] = { name, catalogId: t.cardCatalogId || null, txns: [] };
    cardMap[name].txns.push(t);
  });
  let totalRewardValue = 0;
  const rewardPerCard = [];
  Object.values(cardMap).forEach((g) => {
    const catalogCard = CARD_CATALOG.find((c) => c.id === g.catalogId);
    const result = estimateCardRewards(g.txns, catalogCard, rateOverrides[g.name]);
    totalRewardValue += result.dollarValue;
    rewardPerCard.push({ name: g.name, value: Math.max(0, result.dollarValue) });
  });
  rewardPerCard.sort((a, b) => b.value - a.value);
  const rewardTop = rewardPerCard.slice(0, 6);
  const rewardOther = rewardPerCard.slice(6).reduce((s, e) => s + e.value, 0);
  const rewardDonutData = rewardTop.map((e, i) => ({ label: e.name, value: e.value, color: CATEGORY_PALETTE[i % CATEGORY_PALETTE.length] }));
  if (rewardOther > 0) rewardDonutData.push({ label: "Other", value: rewardOther, color: "#B0A99A" });

  const projTotals = {};
  transactions.forEach((t) => (t.projects || []).forEach((p) => { if (t.amount < 0) projTotals[p] = (projTotals[p] || 0) + -t.amount; }));
  const hasProjects = Object.keys(projTotals).length > 0;

  return (
    <div>
      <div className="serif" style={{ fontSize: 20, fontWeight: 700, marginBottom: 6 }}>Summary</div>
      <p style={{ fontSize: 13, color: "#7A7365", marginBottom: 22, maxWidth: 640 }}>
        A compiled view across everything you've imported — every card, category, and project, all in one place.
      </p>

      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(160px, 1fr))", gap: 12, marginBottom: 24 }}>
        <StatCard label="Avg per charge" value={formatMoney(avgCharge)} sublabel={`${expenses.length} charges`} />
        <StatCard label="Cards" value={String(cardCount)} onClick={() => setPage("cards")} />
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(240px, 1fr))", gap: 16, marginBottom: 24 }}>
        <DonutCard title="Spending by category" data={categoryBreakdownData(transactions, allCategories)} onSegmentClick={goToCategory} />
        <DonutCard title="Spending by card" data={cardBreakdownData(transactions)} onSegmentClick={goToCard} />
        {hasProjects && <DonutCard title="Spending by project" data={projectBreakdownData(transactions)} onSegmentClick={goToProject} />}
        <DonutCard title="Estimated rewards by card" data={rewardDonutData} onSegmentClick={goToCard} />
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(180px, 1fr))", gap: 12 }}>
        <StatCard label="Est. monthly recurring" value={formatMoney(estMonthlyRecurring)} sublabel={`${recurring.length} recurring charge${recurring.length === 1 ? "" : "s"}`} />
        <StatCard label="Est. total rewards" value={formatMoney(totalRewardValue)} sublabel="across all cards" />
      </div>
    </div>
  );
}

// ---------- main app ----------
function LedgerApp() {
  const [transactions, setTransactions] = useState([]);
  const [loaded, setLoaded] = useState(false);
  const [page, setPage] = useState("dashboard");
  const [importMsg, setImportMsg] = useState(null);
  const [importing, setImporting] = useState(false);
  const [cardPickerRequest, setCardPickerRequest] = useState(null);
  const [duplicateReview, setDuplicateReview] = useState(null);
  const [search, setSearch] = useState("");
  const [startDate, setStartDate] = useState("");
  const [endDate, setEndDate] = useState("");
  const [activeCategories, setActiveCategories] = useState(new Set());
  const [activeCards, setActiveCards] = useState(new Set());
  const [activeTags, setActiveTags] = useState(new Set());
  const [activeProjects, setActiveProjects] = useState(new Set());
  const [typeFilter, setTypeFilter] = useState("all");
  const [editingCatId, setEditingCatId] = useState(null);
  const [editingTagsId, setEditingTagsId] = useState(null);
  const [showFilters, setShowFilters] = useState(true);
  const [showMoreFilters, setShowMoreFilters] = useState(false);
  const [quickPickHidden, setQuickPickHidden] = useState(new Set());
  const [quickPickPinned, setQuickPickPinned] = useState([]);
  const [selectedIds, setSelectedIds] = useState(new Set());
  const [cardsPageSelected, setCardsPageSelected] = useState(null);
  const [showBackToTop, setShowBackToTop] = useState(false);
  const [merchantCategories, setMerchantCategories] = useState({});
  const [rateOverrides, setRateOverrides] = useState({});
  const fileInputRef = useRef(null);
  const backupFileInputRef = useRef(null);
  const cancelledRef = useRef(false);

  useEffect(() => {
    (async () => {
      try {
        const res = await storage.get(STORAGE_KEY);
        if (res && res.value) setTransactions(JSON.parse(res.value));
      } catch (e) { /* no data yet */ }
      try {
        const qp = await storage.get(QUICKPICKS_KEY);
        if (qp && qp.value) {
          const parsed = JSON.parse(qp.value);
          setQuickPickHidden(new Set(parsed.hidden || []));
          setQuickPickPinned(parsed.pinned || []);
        }
      } catch (e) { /* none saved yet */ }
      try {
        const mc = await storage.get(MERCHANT_CATEGORIES_KEY);
        if (mc && mc.value) setMerchantCategories(JSON.parse(mc.value));
      } catch (e) { /* none saved yet */ }
      try {
        const rr = await storage.get(RATES_KEY);
        if (rr && rr.value) setRateOverrides(JSON.parse(rr.value));
      } catch (e) { /* none saved yet */ }
      setLoaded(true);
    })();
  }, []);

  useEffect(() => {
    const onScroll = () => setShowBackToTop(window.scrollY > 400);
    window.addEventListener("scroll", onScroll);
    return () => window.removeEventListener("scroll", onScroll);
  }, []);

  const persist = useCallback(async (next) => {
    setTransactions(next);
    try {
      await storage.set(STORAGE_KEY, JSON.stringify(next));
    } catch (e) {
      setImportMsg({ type: "error", text: "Couldn't save changes. Your browser storage may be full or disabled." });
    }
  }, []);

  const persistQuickPicks = async (hidden, pinned) => {
    setQuickPickHidden(hidden);
    setQuickPickPinned(pinned);
    try { await storage.set(QUICKPICKS_KEY, JSON.stringify({ hidden: Array.from(hidden), pinned })); } catch (e) { /* ignore */ }
  };
  const addQuickPick = (val) => { if (!quickPickPinned.includes(val)) persistQuickPicks(quickPickHidden, [...quickPickPinned, val]); };
  const removeAutoQuickPick = (val) => { const next = new Set(quickPickHidden); next.add(val); persistQuickPicks(next, quickPickPinned); };
  const removePinnedQuickPick = (val) => persistQuickPicks(quickPickHidden, quickPickPinned.filter((m) => m !== val));

  const pickCardForFile = (fileName) => new Promise((resolve) => setCardPickerRequest({ fileName, resolve }));
  const reviewDuplicates = (dupItems) => new Promise((resolve) => setDuplicateReview({ dupItems, resolve }));

  const cancelImport = () => { cancelledRef.current = true; };

  const importFiles = useCallback(async (fileList) => {
    const files = Array.from(fileList || []);
    if (!files.length) return;
    cancelledRef.current = false;
    setImporting(true);
    setImportMsg(null);

    let invalidTotal = 0, skippedFiles = 0, signFlippedFiles = 0, autoCategorized = 0, pdfUnrecognizedFiles = 0;
    const parsedRows = [];
    let cancelled = false;

    for (const file of files) {
      if (cancelledRef.current) { cancelled = true; break; }

      const isPdf = file.name.toLowerCase().endsWith(".pdf") || file.type === "application/pdf";
      if (isPdf) {
        let pdfTxns;
        try {
          pdfTxns = await parsePdfTransactions(file);
        } catch (e) {
          invalidTotal += 1;
          continue;
        }
        if (cancelledRef.current) { cancelled = true; break; }
        if (pdfTxns.length === 0) { pdfUnrecognizedFiles += 1; continue; }

        const fileCard = await pickCardForFile(file.name);
        if (cancelledRef.current) { cancelled = true; break; }
        if (!fileCard) { skippedFiles += 1; continue; }

        pdfTxns.forEach((row) => {
          let category = "";
          const learnedKey = merchantKey(row.description);
          if (learnedKey && merchantCategories[learnedKey]) {
            category = merchantCategories[learnedKey];
            autoCategorized += 1;
          }
          const dedupKey = `${row.date}|${row.description.toLowerCase()}|${row.amount.toFixed(2)}|${fileCard.name}`;
          parsedRows.push({
            id: `${Date.now()}-${Math.random().toString(36).slice(2, 9)}`,
            date: row.date, description: row.description, amount: row.amount, category: category || "Uncategorized",
            card: fileCard.name, cardCatalogId: fileCard.catalogId, tags: [], projects: [], source: file.name, dedupKey,
          });
        });
        continue;
      }

      let results;
      try {
        results = await parseFileAsync(file);
      } catch (e) {
        invalidTotal += 1;
        continue;
      }
      if (cancelledRef.current) { cancelled = true; break; }
      const fields = results.meta.fields || [];
      const cols = detectColumns(fields);

      let fileCard = null;
      if (!cols.card) {
        fileCard = await pickCardForFile(file.name);
        if (cancelledRef.current) { cancelled = true; break; }
        if (!fileCard) { skippedFiles += 1; continue; }
      }

      const signFlip = cols.amount ? detectSignFlip(results.data, cols) : 1;
      if (signFlip === -1) signFlippedFiles += 1;

      results.data.forEach((row) => {
        const dateIso = cols.date ? parseDateFlexible(row[cols.date]) : null;
        let amount = null;
        if (cols.amount) {
          amount = parseAmount(row[cols.amount]);
          if (amount != null) amount *= signFlip;
        } else if (cols.debit || cols.credit) {
          const rawDebit = cols.debit ? parseAmount(row[cols.debit]) : 0;
          const rawCredit = cols.credit ? parseAmount(row[cols.credit]) : 0;
          const debit = rawDebit != null ? Math.abs(rawDebit) : 0;
          const credit = rawCredit != null ? Math.abs(rawCredit) : 0;
          if ((rawDebit == null || rawDebit === 0) && (rawCredit == null || rawCredit === 0)) {
            amount = null;
          } else {
            amount = credit - debit;
          }
        }
        const description = cols.description ? String(row[cols.description] || "").trim() : "";
        let category = cols.category ? String(row[cols.category] || "").trim() : "";
        const card = cols.card ? (String(row[cols.card] || "").trim() || "Unlabeled") : fileCard.name;
        const cardCatalogId = cols.card ? null : fileCard.catalogId;

        if (dateIso == null || amount == null || !description) {
          invalidTotal += 1;
          return;
        }
        if (!category) {
          const learnedKey = merchantKey(description);
          if (learnedKey && merchantCategories[learnedKey]) {
            category = merchantCategories[learnedKey];
            autoCategorized += 1;
          }
        }
        const dedupKey = `${dateIso}|${description.toLowerCase()}|${amount.toFixed(2)}|${card}`;
        parsedRows.push({
          id: `${Date.now()}-${Math.random().toString(36).slice(2, 9)}`,
          date: dateIso, description, amount, category: category || "Uncategorized",
          card, cardCatalogId, tags: [], projects: [], source: file.name, dedupKey,
        });
      });
    }

    if (cancelled) {
      setImporting(false);
      setImportMsg({ type: "warn", text: "Import cancelled — no changes were made." });
      return;
    }

    const existingByKey = new Map(transactions.map((t) => [t.dedupKey, t]));
    const seenInBatch = new Map();
    const clean = [];
    const dupItems = [];

    parsedRows.forEach((row) => {
      const existingMatch = existingByKey.get(row.dedupKey);
      const batchMatch = seenInBatch.get(row.dedupKey);
      if (existingMatch || batchMatch) {
        dupItems.push({ candidate: row, matchOf: existingMatch ? "an existing transaction already in your ledger" : "another row in this same upload" });
      } else {
        seenInBatch.set(row.dedupKey, row);
        clean.push(row);
      }
    });

    let kept = [];
    if (dupItems.length > 0) {
      const result = await reviewDuplicates(dupItems);
      if (result === null) {
        setImporting(false);
        setImportMsg({ type: "warn", text: "Import cancelled — no changes were made." });
        return;
      }
      kept = result;
    }

    const running = transactions.concat(clean, kept);
    persist(running);
    setImporting(false);
    const addedTotal = clean.length + kept.length;
    const skippedTotal = dupItems.length - kept.length;
    const parts = [`Added ${addedTotal} transaction${addedTotal === 1 ? "" : "s"}`];
    if (skippedTotal) parts.push(`skipped ${skippedTotal} duplicate${skippedTotal === 1 ? "" : "s"}`);
    if (invalidTotal) parts.push(`couldn't read ${invalidTotal} row${invalidTotal === 1 ? "" : "s"}`);
    if (skippedFiles) parts.push(`skipped ${skippedFiles} file${skippedFiles === 1 ? "" : "s"}`);
    if (signFlippedFiles) parts.push(`auto-corrected charge/payment signs in ${signFlippedFiles} file${signFlippedFiles === 1 ? "" : "s"}`);
    if (autoCategorized) parts.push(`auto-categorized ${autoCategorized} row${autoCategorized === 1 ? "" : "s"} from merchants you've categorized before`);
    if (pdfUnrecognizedFiles) parts.push(`couldn't find recognizable transaction lines in ${pdfUnrecognizedFiles} PDF file${pdfUnrecognizedFiles === 1 ? "" : "s"} — that statement's layout may not be supported yet`);
    setImportMsg({ type: addedTotal ? "success" : "warn", text: parts.join(", ") + "." });
  }, [transactions, persist, merchantCategories]);

  const deleteTransaction = (id) => persist(transactions.filter((t) => t.id !== id));

  const clearAll = () => {
    if (window.confirm("Delete all imported transactions? This can't be undone.")) persist([]);
  };

  const persistMerchantCategories = async (next) => {
    setMerchantCategories(next);
    try { await storage.set(MERCHANT_CATEGORIES_KEY, JSON.stringify(next)); } catch (e) { /* ignore */ }
  };

  const updateCategory = (id, category) => {
    const finalCategory = category || "Uncategorized";
    const target = transactions.find((t) => t.id === id);
    const key = target ? merchantKey(target.description) : "";
    const shouldLearn = finalCategory !== "Uncategorized" && !!key;
    const next = transactions.map((t) => {
      if (t.id === id) return { ...t, category: finalCategory };
      if (shouldLearn && (t.category === "Uncategorized" || !t.category) && merchantKey(t.description) === key) {
        return { ...t, category: finalCategory };
      }
      return t;
    });
    persist(next);
    setEditingCatId(null);
    if (shouldLearn) persistMerchantCategories({ ...merchantCategories, [key]: finalCategory });
  };

  const updateTags = (id, tags, projects) => {
    const next = transactions.map((t) => (t.id === id ? { ...t, tags, projects } : t));
    persist(next);
  };

  const toggleSelect = (id) => {
    const next = new Set(selectedIds);
    if (next.has(id)) next.delete(id); else next.add(id);
    setSelectedIds(next);
  };
  const toggleSelectAll = (ids) => {
    const allSelected = ids.length > 0 && ids.every((id) => selectedIds.has(id));
    const next = new Set(selectedIds);
    ids.forEach((id) => (allSelected ? next.delete(id) : next.add(id)));
    setSelectedIds(next);
  };
  const clearSelection = () => setSelectedIds(new Set());

  const bulkSetCategory = (category) => {
    const finalCategory = category || "Uncategorized";
    const selectedTxns = transactions.filter((t) => selectedIds.has(t.id));
    const keysToLearn = new Set();
    selectedTxns.forEach((t) => { const k = merchantKey(t.description); if (k) keysToLearn.add(k); });
    const next = transactions.map((t) => {
      if (selectedIds.has(t.id)) return { ...t, category: finalCategory };
      if (finalCategory !== "Uncategorized" && (t.category === "Uncategorized" || !t.category) && keysToLearn.has(merchantKey(t.description))) {
        return { ...t, category: finalCategory };
      }
      return t;
    });
    persist(next);
    if (finalCategory !== "Uncategorized" && keysToLearn.size) {
      const learned = { ...merchantCategories };
      keysToLearn.forEach((k) => { learned[k] = finalCategory; });
      persistMerchantCategories(learned);
    }
    clearSelection();
  };

  const bulkFlipSign = () => {
    if (selectedIds.size === 0) return;
    if (!window.confirm(`Flip the charge/payment sign on ${selectedIds.size} selected transaction${selectedIds.size === 1 ? "" : "s"}?`)) return;
    const next = transactions.map((t) => (selectedIds.has(t.id) ? { ...t, amount: -t.amount } : t));
    persist(next);
    clearSelection();
  };

  const bulkAddTags = (tags, projects) => {
    if (!tags.length && !projects.length) return;
    const next = transactions.map((t) => {
      if (!selectedIds.has(t.id)) return t;
      const mergedTags = Array.from(new Set([...(t.tags || []), ...tags]));
      const mergedProjects = Array.from(new Set([...(t.projects || []), ...projects]));
      return { ...t, tags: mergedTags, projects: mergedProjects };
    });
    persist(next);
    clearSelection();
  };

  const saveCategoryRates = async (cardName, ratesObj) => {
    const next = { ...rateOverrides, [cardName]: ratesObj };
    setRateOverrides(next);
    try { await storage.set(RATES_KEY, JSON.stringify(next)); } catch (e) { /* ignore */ }
  };

  const flipCardSigns = (cardName) => {
    if (!window.confirm(`Flip the charge/payment signs for all transactions on "${cardName}"? Use this if charges and payments look swapped for this card.`)) return;
    const next = transactions.map((t) => ((t.card || "Unlabeled") === cardName ? { ...t, amount: -t.amount } : t));
    persist(next);
  };

  const fixPaymentSigns = (cardName) => {
    const isPaymentLike = (desc) => {
      const d = (desc || "").toLowerCase();
      return d.includes("payment") || d.includes("thank you");
    };
    const affected = transactions.filter((t) => (t.card || "Unlabeled") === cardName && isPaymentLike(t.description) && t.amount < 0);
    if (affected.length === 0) {
      window.alert(`No negative payment-looking rows found for "${cardName}" — nothing to fix.`);
      return;
    }
    if (!window.confirm(`Found ${affected.length} row(s) on "${cardName}" that look like payments (contain "payment" or "thank you") but are currently negative. Flip just these to positive?`)) return;
    const next = transactions.map((t) => (
      (t.card || "Unlabeled") === cardName && isPaymentLike(t.description) && t.amount < 0
        ? { ...t, amount: -t.amount }
        : t
    ));
    persist(next);
  };

  const allCategories = useMemo(() => {
    const set = new Set(transactions.map((t) => t.category || "Uncategorized"));
    return Array.from(set).sort();
  }, [transactions]);

  const allCards = useMemo(() => {
    const set = new Set(transactions.map((t) => t.card || "Unlabeled"));
    return Array.from(set).sort();
  }, [transactions]);

  const allTags = useMemo(() => {
    const set = new Set();
    transactions.forEach((t) => (t.tags || []).forEach((tag) => set.add(tag)));
    return Array.from(set).sort();
  }, [transactions]);

  const allProjects = useMemo(() => {
    const set = new Set();
    transactions.forEach((t) => (t.projects || []).forEach((p) => set.add(p)));
    return Array.from(set).sort();
  }, [transactions]);

  const topMerchants = useMemo(() => {
    const counts = {};
    transactions.forEach((t) => {
      const short = shortMerchantName(t.description);
      counts[short] = (counts[short] || 0) + 1;
    });
    return Object.entries(counts).sort((a, b) => b[1] - a[1]).slice(0, 6).map(([name]) => name);
  }, [transactions]);

  const filtered = useMemo(() => {
    return transactions.filter((t) => {
      const tDate = t.date || "";
      const tDesc = t.description || "";
      if (startDate && tDate < startDate) return false;
      if (endDate && tDate > endDate) return false;
      if (search && !tDesc.toLowerCase().includes(search.toLowerCase())) return false;
      if (activeCategories.size && !activeCategories.has(t.category)) return false;
      if (activeCards.size && !activeCards.has(t.card || "Unlabeled")) return false;
      if (activeTags.size && !(t.tags || []).some((tag) => activeTags.has(tag))) return false;
      if (activeProjects.size && !(t.projects || []).some((p) => activeProjects.has(p))) return false;
      if (typeFilter === "income" && t.amount <= 0) return false;
      if (typeFilter === "expense" && t.amount >= 0) return false;
      return true;
    });
  }, [transactions, startDate, endDate, search, activeCategories, activeCards, activeTags, activeProjects, typeFilter]);

  const summary = useMemo(() => {
    let income = 0, expense = 0;
    filtered.forEach((t) => { if (t.amount > 0) income += t.amount; else expense += -t.amount; });
    return { income, expense, net: income - expense, count: filtered.length };
  }, [filtered]);

  const recurringCharges = useMemo(() => detectRecurring(filtered), [filtered]);

  const categoryChartData = useMemo(() => {
    const totals = {};
    filtered.forEach((t) => {
      if (t.amount >= 0) return;
      const cat = t.category || "Uncategorized";
      totals[cat] = (totals[cat] || 0) + -t.amount;
    });
    return Object.entries(totals).map(([category, total]) => ({ category, total })).sort((a, b) => b.total - a.total).slice(0, 8);
  }, [filtered]);

  const toggleCategory = (cat) => {
    const next = new Set(activeCategories);
    if (next.has(cat)) next.delete(cat); else next.add(cat);
    setActiveCategories(next);
  };
  const toggleCard = (card) => {
    const next = new Set(activeCards);
    if (next.has(card)) next.delete(card); else next.add(card);
    setActiveCards(next);
  };
  const toggleTag = (tag) => {
    const next = new Set(activeTags);
    if (next.has(tag)) next.delete(tag); else next.add(tag);
    setActiveTags(next);
  };
  const toggleProject = (project) => {
    const next = new Set(activeProjects);
    if (next.has(project)) next.delete(project); else next.add(project);
    setActiveProjects(next);
  };
  const clearFilters = () => {
    setSearch(""); setStartDate(""); setEndDate("");
    setActiveCategories(new Set()); setActiveCards(new Set()); setActiveTags(new Set()); setActiveProjects(new Set()); setTypeFilter("all");
  };
  const hasActiveFilters = search || startDate || endDate || activeCategories.size || activeCards.size || activeTags.size || activeProjects.size || typeFilter !== "all";

  const clearDrilldownFilters = () => {
    setActiveCategories(new Set());
    setActiveCards(new Set());
    setActiveProjects(new Set());
    setActiveTags(new Set());
    setTypeFilter("all");
  };

  const goToCategory = (category) => {
    setPage("dashboard");
    clearDrilldownFilters();
    setActiveCategories(new Set([category]));
    setShowFilters(true);
    setShowMoreFilters(true);
  };
  const goToCard = (cardName) => {
    setPage("dashboard");
    clearDrilldownFilters();
    setActiveCards(new Set([cardName]));
    setShowFilters(true);
    setShowMoreFilters(true);
  };
  const goToCategoryWithCard = (category, cardName) => {
    setPage("dashboard");
    clearDrilldownFilters();
    setActiveCategories(new Set([category]));
    if (cardName) setActiveCards(new Set([cardName]));
    setShowFilters(true);
    setShowMoreFilters(true);
  };
  const goToProject = (projectName) => {
    setPage("dashboard");
    clearDrilldownFilters();
    setActiveProjects(new Set([projectName]));
    setShowFilters(true);
    setShowMoreFilters(true);
  };
  const goToType = (label) => {
    setPage("dashboard");
    clearDrilldownFilters();
    setTypeFilter(label === "Charges" ? "expense" : "income");
    setShowFilters(true);
  };

  const exportCSV = () => {
    const header = "Date,Description,Amount,Category,Card,Tags,Projects\n";
    const rows = filtered.map((t) => `${t.date},"${t.description.replace(/"/g, '""')}",${t.amount},${t.category},"${(t.card || "").replace(/"/g, '""')}","${(t.tags || []).join("; ")}","${(t.projects || []).join("; ")}"`).join("\n");
    const blob = new Blob([header + rows], { type: "text/csv" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = "ledger-export.csv"; a.click();
    URL.revokeObjectURL(url);
  };

  const exportBackup = () => {
    const backup = {
      type: "ledger-backup", version: 1, exportedAt: new Date().toISOString(),
      transactions: localStorage.getItem(STORAGE_KEY),
      manualRates: localStorage.getItem(RATES_KEY),
      quickPicks: localStorage.getItem(QUICKPICKS_KEY),
      merchantCategories: localStorage.getItem(MERCHANT_CATEGORIES_KEY),
    };
    const blob = new Blob([JSON.stringify(backup, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    const stamp = new Date().toISOString().slice(0, 10);
    a.href = url; a.download = `ledger-backup-${stamp}.json`; a.click();
    URL.revokeObjectURL(url);
  };

  const importBackup = async (file) => {
    if (!file) return;
    let backup;
    try {
      const text = await file.text();
      backup = JSON.parse(text);
    } catch (e) {
      setImportMsg({ type: "error", text: "Couldn't read that file — make sure it's a .json backup exported from The Ledger." });
      return;
    }
    if (!backup || typeof backup !== "object" || (!backup.transactions && !backup.manualRates && !backup.quickPicks && !backup.merchantCategories)) {
      setImportMsg({ type: "error", text: "That file doesn't look like a Ledger backup." });
      return;
    }
    if (!window.confirm("Restoring this backup will replace all transactions, categories, and settings currently in this browser with the backup's data. This can't be undone. Continue?")) return;
    if (backup.transactions) localStorage.setItem(STORAGE_KEY, backup.transactions);
    if (backup.manualRates) localStorage.setItem(RATES_KEY, backup.manualRates);
    if (backup.quickPicks) localStorage.setItem(QUICKPICKS_KEY, backup.quickPicks);
    if (backup.merchantCategories) localStorage.setItem(MERCHANT_CATEGORIES_KEY, backup.merchantCategories);
    window.location.reload();
  };

  const maxCategoryTotal = categoryChartData.length ? categoryChartData[0].total : 1;
  const showInsights = loaded && transactions.length > 0 && page !== "summary";

  const singleCardName = page === "dashboard" && activeCards.size === 1 ? Array.from(activeCards)[0] : null;

  let insightsStat = null, insightsPrimaryDonut = null, insightsSecondaryDonut = null;
  let headerStats = [];
  if (page === "dashboard") {
    const expensesInScope = filtered.filter((t) => t.amount < 0);
    const avg = expensesInScope.length ? expensesInScope.reduce((s, t) => s + -t.amount, 0) / expensesInScope.length : 0;
    insightsStat = expensesInScope.length > 0 ? { label: "Avg per charge", value: formatMoney(avg), sublabel: `across ${expensesInScope.length} charge${expensesInScope.length === 1 ? "" : "s"}` } : null;
    insightsPrimaryDonut = { title: "Charges vs. payments", data: typeBreakdownData(filtered), onSegmentClick: goToType };
    insightsSecondaryDonut = singleCardName
      ? { title: `Spending by category — ${singleCardName}`, data: categoryBreakdownData(filtered, allCategories), onSegmentClick: (category) => goToCategoryWithCard(category, singleCardName) }
      : { title: "Spending by card", data: cardBreakdownData(filtered), onSegmentClick: goToCard };
    headerStats = [
      { icon: <I.Down size={16} />, label: "Charges", value: formatMoney(summary.expense), accent: "#E38A73", big: true, onClick: () => goToType("Charges") },
      { icon: <I.Up size={16} />, label: "Payments & credits", value: formatMoney(summary.income), accent: "#6FCFAE", onClick: () => goToType("Payments & credits") },
      { icon: <I.Wallet size={16} />, label: "Net change", value: formatMoney(summary.net), accent: summary.net >= 0 ? "#6FCFAE" : "#E38A73" },
      { icon: <I.Tag size={16} />, label: "Transactions", value: summary.count.toLocaleString(), accent: "#C98A3E" },
    ];
  } else if (page === "summary") {
    const expensesAll = transactions.filter((t) => t.amount < 0);
    const incomeAll = transactions.filter((t) => t.amount > 0);
    const totalChargesAll = expensesAll.reduce((s, t) => s + -t.amount, 0);
    const totalPaymentsAll = incomeAll.reduce((s, t) => s + t.amount, 0);
    headerStats = [
      { icon: <I.Down size={16} />, label: "Total charges", value: formatMoney(totalChargesAll), accent: "#E38A73", big: true, onClick: () => goToType("Charges") },
      { icon: <I.Up size={16} />, label: "Total payments & credits", value: formatMoney(totalPaymentsAll), accent: "#6FCFAE", onClick: () => goToType("Payments & credits") },
      { icon: <I.Wallet size={16} />, label: "Net change", value: formatMoney(totalPaymentsAll - totalChargesAll), accent: totalPaymentsAll - totalChargesAll >= 0 ? "#6FCFAE" : "#E38A73" },
      { icon: <I.Tag size={16} />, label: "All-time transactions", value: transactions.length.toLocaleString(), accent: "#C98A3E", onClick: () => setPage("dashboard") },
    ];
  } else if (page === "cards") {
    const expensesAll = transactions.filter((t) => t.amount < 0);
    const total = expensesAll.reduce((s, t) => s + -t.amount, 0);
    const totalPaymentsAll = transactions.filter((t) => t.amount > 0).reduce((s, t) => s + t.amount, 0);
    const cardCount = new Set(transactions.map((t) => t.card || "Unlabeled")).size;
    const cardTotals = {};
    expensesAll.forEach((t) => { const c = t.card || "Unlabeled"; cardTotals[c] = (cardTotals[c] || 0) + -t.amount; });
    const cardEntries = Object.entries(cardTotals).sort((a, b) => b[1] - a[1]);
    const topCard = cardEntries[0];
    const scopeTxns = cardsPageSelected ? transactions.filter((t) => (t.card || "Unlabeled") === cardsPageSelected) : transactions;
    const scopeCharges = scopeTxns.filter((t) => t.amount < 0).reduce((s, t) => s + -t.amount, 0);
    insightsStat = scopeCharges > 0 ? { label: "Total charged", value: formatMoney(scopeCharges), sublabel: cardsPageSelected || `across ${cardCount} card${cardCount === 1 ? "" : "s"}` } : null;
    insightsPrimaryDonut = {
      title: cardsPageSelected ? `Spending by category — ${cardsPageSelected}` : "Spending by category",
      data: categoryBreakdownData(scopeTxns, allCategories),
      onSegmentClick: (category) => goToCategoryWithCard(category, cardsPageSelected),
    };
    headerStats = [
      { icon: <I.Card size={16} />, label: "Cards", value: String(cardCount), accent: "#C98A3E", onClick: () => setCardsPageSelected(null) },
      { icon: <I.Down size={16} />, label: "Total charged", value: formatMoney(total), accent: "#E38A73", big: true, onClick: () => goToType("Charges") },
      { icon: <I.Up size={16} />, label: "Total payments", value: formatMoney(totalPaymentsAll), accent: "#6FCFAE", onClick: () => goToType("Payments & credits") },
      { icon: <I.Star size={16} />, label: "Top card", value: topCard ? topCard[0] : "—", accent: "#3F5A73", sublabel: topCard ? formatMoney(topCard[1]) : undefined, onClick: topCard ? () => setCardsPageSelected(topCard[0]) : undefined },
    ];
  } else if (page === "projects") {
    const projTotals = {};
    transactions.forEach((t) => (t.projects || []).forEach((p) => { if (t.amount < 0) projTotals[p] = (projTotals[p] || 0) + -t.amount; }));
    const projEntries = Object.entries(projTotals).sort((a, b) => b[1] - a[1]);
    const projNames = projEntries.map(([n]) => n);
    const projTotal = projEntries.reduce((s, [, v]) => s + v, 0);
    const topProject = projEntries[0];
    insightsStat = { label: "Total across projects", value: formatMoney(projTotal), sublabel: `${projNames.length} project${projNames.length === 1 ? "" : "s"}` };
    insightsPrimaryDonut = { title: "Spending by project", data: projectBreakdownData(transactions), onSegmentClick: goToProject };
    headerStats = [
      { icon: <I.Folder size={16} />, label: "Projects", value: String(projEntries.length), accent: "#C98A3E" },
      { icon: <I.Down size={16} />, label: "Total spent", value: formatMoney(projTotal), accent: "#E38A73", big: true, onClick: () => goToType("Charges") },
      { icon: <I.Star size={16} />, label: "Largest project", value: topProject ? topProject[0] : "—", accent: "#3F5A73", sublabel: topProject ? formatMoney(topProject[1]) : undefined, onClick: topProject ? () => goToProject(topProject[0]) : undefined },
      { icon: <I.Wallet size={16} />, label: "Avg per project", value: formatMoney(projEntries.length ? projTotal / projEntries.length : 0), accent: "#6FCFAE" },
    ];
  } else if (page === "rewards") {
    const map = {};
    transactions.forEach((t) => {
      const name = t.card || "Unlabeled";
      if (!map[name]) map[name] = { name, catalogId: t.cardCatalogId || null, txns: [] };
      map[name].txns.push(t);
    });
    const perCard = [];
    let totalRewardValue = 0;
    Object.values(map).forEach((g) => {
      const catalogCard = CARD_CATALOG.find((c) => c.id === g.catalogId);
      const result = estimateCardRewards(g.txns, catalogCard, rateOverrides[g.name]);
      totalRewardValue += result.dollarValue;
      perCard.push({ name: g.name, value: Math.max(0, result.dollarValue) });
    });
    perCard.sort((a, b) => b.value - a.value);
    const topRewardCards = perCard.slice(0, 6);
    const otherRewardSum = perCard.slice(6).reduce((s, e) => s + e.value, 0);
    const rewardDonutData = topRewardCards.map((e, i) => ({ label: e.name, value: e.value, color: CATEGORY_PALETTE[i % CATEGORY_PALETTE.length] }));
    if (otherRewardSum > 0) rewardDonutData.push({ label: "Other", value: otherRewardSum, color: "#B0A99A" });
    const bestCard = perCard[0];
    const totalChargesAnalyzed = transactions.filter((t) => t.amount < 0).reduce((s, t) => s + -t.amount, 0);
    insightsStat = { label: "Total estimated rewards", value: formatMoney(totalRewardValue), sublabel: `across ${perCard.length} card${perCard.length === 1 ? "" : "s"}` };
    insightsPrimaryDonut = { title: "Estimated rewards by card", data: rewardDonutData, onSegmentClick: goToCard };
    headerStats = [
      { icon: <I.Star size={16} />, label: "Est. total rewards", value: formatMoney(totalRewardValue), accent: "#2F6F5E", big: true },
      { icon: <I.Card size={16} />, label: "Cards tracked", value: String(perCard.length), accent: "#C98A3E", onClick: () => setPage("cards") },
      { icon: <I.Wallet size={16} />, label: "Best card", value: bestCard ? bestCard.name : "—", accent: "#3F5A73", sublabel: bestCard ? formatMoney(bestCard.value) : undefined, onClick: bestCard ? () => goToCard(bestCard.name) : undefined },
      { icon: <I.Down size={16} />, label: "Charges analyzed", value: formatMoney(totalChargesAnalyzed), accent: "#E38A73", onClick: () => goToType("Charges") },
    ];
  }

  const tableProps = {
    allCategories, editingCatId, setEditingCatId, updateCategory, deleteTransaction,
    editingTagsId, setEditingTagsId, updateTags, selectedIds, toggleSelect, toggleSelectAll,
  };

  return (
    <div style={{ display: "flex", background: "#EDEBE3", minHeight: "100vh" }}>
      <Sidebar page={page} setPage={setPage} />
      <div className="app-main" style={{ flex: 1, minWidth: 0, fontFamily: "'Inter', sans-serif", color: "#22303F" }}>
        <div style={{ background: "#22303F", color: "#EDEBE3", padding: "36px 28px 28px" }}>
          <div style={{ maxWidth: 1400, margin: "0 auto" }}>
            <div style={{ display: "flex", alignItems: "baseline", justifyContent: "space-between", flexWrap: "wrap", gap: 12 }}>
              <div>
                <div className="mono" style={{ fontSize: 11, letterSpacing: 2, color: "#C98A3E", marginBottom: 6 }}>PRIVATE · STORED ONLY IN THIS BROWSER</div>
                <h1 className="serif" style={{ fontSize: 34, margin: 0, fontWeight: 700 }}>The Ledger</h1>
                <p style={{ margin: "6px 0 0", color: "#B9C2C9", fontSize: 14 }}>Your transactions, uploaded, sorted, and searched — kept to yourself.</p>
              </div>
              <div style={{ display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap" }}>
                {importing && (
                  <button onClick={cancelImport} className="chip" style={{ background: "transparent", borderColor: "rgba(255,255,255,0.3)", color: "#EDEBE3" }}>
                    <I.X size={12} /> Cancel upload
                  </button>
                )}
                <button
                  onClick={exportBackup} title="Download a backup file of everything — transactions, categories, tags, and settings"
                  className="chip" style={{ background: "transparent", borderColor: "rgba(255,255,255,0.3)", color: "#EDEBE3" }}
                >
                  <I.Download size={12} /> Backup
                </button>
                <button
                  onClick={() => backupFileInputRef.current && backupFileInputRef.current.click()}
                  title="Restore from a backup file — useful for bringing data over to a phone or another browser"
                  className="chip" style={{ background: "transparent", borderColor: "rgba(255,255,255,0.3)", color: "#EDEBE3" }}
                >
                  <I.Upload size={12} /> Restore
                  <input
                    ref={backupFileInputRef} type="file" accept="application/json,.json" style={{ display: "none" }}
                    onChange={(e) => { importBackup(e.target.files[0]); e.target.value = ""; }}
                  />
                </button>
                <label style={{ display: "flex", alignItems: "center", gap: 8, background: "#C98A3E", color: "#22303F", padding: "10px 18px", borderRadius: 8, fontWeight: 600, fontSize: 13, cursor: "pointer" }}>
                  {importing ? <span className="spin"><I.Repeat size={16} /></span> : <I.Upload size={16} />}
                  {importing ? "Importing…" : "Upload statement"}
                  <input ref={fileInputRef} type="file" accept=".csv,.pdf" multiple style={{ display: "none" }} onChange={(e) => { importFiles(e.target.files); e.target.value = ""; }} />
                </label>
              </div>
            </div>

            {importMsg && (
              <div style={{
                marginTop: 14, padding: "8px 12px", borderRadius: 6, fontSize: 13, display: "flex", alignItems: "center", gap: 8,
                background: importMsg.type === "error" ? "#4a2a24" : "#25423a", color: importMsg.type === "error" ? "#f0b8ab" : "#bfe3d4",
              }}>
                {importMsg.type === "error" ? <I.Alert size={14} /> : <I.Check size={14} />}
                {importMsg.text}
                <button onClick={() => setImportMsg(null)} style={{ marginLeft: "auto", background: "none", border: "none", color: "inherit", cursor: "pointer" }}><I.X size={13} /></button>
              </div>
            )}

            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(160px, 1fr))", gap: 12, marginTop: 22 }}>
              {headerStats.map((s, i) => <SummaryCard key={s.label + i} {...s} />)}
            </div>
          </div>
        </div>
        <div className="perforation" />

        <div className="content-row" style={{ maxWidth: 1400, margin: "0 auto", padding: "24px 28px 60px", display: "flex", gap: 24 }}>
          <div style={{ flex: 1, minWidth: 0 }}>
            {selectedIds.size > 0 && (
              <BulkActionBar count={selectedIds.size} categories={allCategories} allTags={allTags} onApply={bulkSetCategory} onAddTags={bulkAddTags} onFlipSign={bulkFlipSign} onClear={clearSelection} />
            )}
            {!loaded ? (
              <div style={{ padding: 40, textAlign: "center", color: "#7A7365" }}>Loading your ledger…</div>
            ) : page === "summary" ? (
              <SummaryPage transactions={transactions} allCategories={allCategories} rateOverrides={rateOverrides} goToCategory={goToCategory} goToCard={goToCard} goToProject={goToProject} setPage={setPage} />
            ) : transactions.length === 0 && page === "dashboard" ? (
              <EmptyState onUpload={() => fileInputRef.current && fileInputRef.current.click()} />
            ) : page === "cards" ? (
              <CardsPage transactions={transactions} {...tableProps} flipCardSigns={flipCardSigns} fixPaymentSigns={fixPaymentSigns} selected={cardsPageSelected} setSelected={setCardsPageSelected} />
            ) : page === "projects" ? (
              <ProjectsPage transactions={transactions} {...tableProps} />
            ) : page === "rewards" ? (
              <RewardsPage transactions={transactions} {...tableProps} rateOverrides={rateOverrides} saveCategoryRates={saveCategoryRates} />
            ) : (
              <React.Fragment>
                <div style={{ display: "flex", gap: 10, marginBottom: 14, flexWrap: "wrap", alignItems: "center" }}>
                  <div style={{ position: "relative", flex: "1 1 260px" }}>
                    <span style={{ position: "absolute", left: 10, top: 9, color: "#7A7365" }}><I.Search size={15} /></span>
                    <input className="ledger-input" style={{ paddingLeft: 32 }} placeholder="Search by store or description…" value={search} onChange={(e) => setSearch(e.target.value)} />
                  </div>
                  <button onClick={() => setShowFilters((s) => !s)} className="chip" style={{ padding: "8px 14px" }}>
                    <I.Filter size={13} /> Filters {hasActiveFilters && `(${[startDate, endDate].filter(Boolean).length + activeCategories.size + activeCards.size + activeTags.size + activeProjects.size + (typeFilter !== "all" ? 1 : 0)})`}
                    <span style={{ transform: showFilters ? "rotate(180deg)" : "none", transition: "transform 0.15s", display: "inline-block" }}><I.Chevron size={13} /></span>
                  </button>
                  <button onClick={exportCSV} className="chip" style={{ padding: "8px 14px" }}><I.Download size={13} /> Export</button>
                  <div style={{ marginLeft: "auto", paddingLeft: 14, borderLeft: "1px solid #C9C2B2" }}>
                    <button onClick={clearAll} className="chip" style={{ padding: "8px 14px", color: "#A6432F" }}><I.Trash size={13} /> Delete all data</button>
                  </div>
                </div>

                {showFilters && (
                  <div style={{ background: "#F6F4EE", border: "1px solid #C9C2B2", borderRadius: 10, padding: 18, marginBottom: 18 }}>
                    <Field label="Date range">
                      <DateRangeControl startDate={startDate} endDate={endDate} onChange={(s, e) => { setStartDate(s); setEndDate(e); }} />
                    </Field>

                    <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(150px, 1fr))", gap: 14, marginTop: 16 }}>
                      <Field label="Type">
                        <select className="ledger-input" value={typeFilter} onChange={(e) => setTypeFilter(e.target.value)}>
                          <option value="all">All</option>
                          <option value="expense">Charges</option>
                          <option value="income">Payments & credits</option>
                        </select>
                      </Field>
                    </div>
                    <div style={{ fontSize: 11, color: "#B0A99A", marginTop: 8 }}>Tip: click any column header in the table below to sort by it.</div>

                    <div style={{ marginTop: 16 }}>
                      <div style={{ fontSize: 11, color: "#7A7365", marginBottom: 6, letterSpacing: 0.5 }}>QUICK PICKS</div>
                      <QuickPicks
                        auto={topMerchants} pinned={quickPickPinned} hidden={quickPickHidden}
                        search={search} setSearch={setSearch}
                        onAdd={addQuickPick} onRemoveAuto={removeAutoQuickPick} onRemovePinned={removePinnedQuickPick}
                      />
                    </div>

                    <button
                      onClick={() => setShowMoreFilters((s) => !s)}
                      style={{ marginTop: 16, background: "none", border: "none", color: "#3F5A73", fontSize: 12, cursor: "pointer", display: "flex", alignItems: "center", gap: 4, padding: 0 }}
                    >
                      More filters (Cards, Tags, Categories)
                      <span style={{ transform: showMoreFilters ? "rotate(180deg)" : "none", display: "inline-block", transition: "transform 0.15s" }}><I.Chevron size={11} /></span>
                    </button>

                    {showMoreFilters && (
                      <React.Fragment>
                        {allCards.length > 0 && (
                          <div style={{ marginTop: 16 }}>
                            <div style={{ fontSize: 11, color: "#7A7365", marginBottom: 6, letterSpacing: 0.5 }}>CARDS</div>
                            <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                              {allCards.map((c) => (<button key={c} onClick={() => toggleCard(c)} className={`chip ${activeCards.has(c) ? "active" : ""}`}><I.Card size={11} /> {c}</button>))}
                            </div>
                          </div>
                        )}

                        {allTags.length > 0 && (
                          <div style={{ marginTop: 16 }}>
                            <div style={{ fontSize: 11, color: "#7A7365", marginBottom: 6, letterSpacing: 0.5 }}>TAGS</div>
                            <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                              {allTags.map((tag) => (<button key={tag} onClick={() => toggleTag(tag)} className={`chip ${activeTags.has(tag) ? "active" : ""}`}>{tag}</button>))}
                            </div>
                          </div>
                        )}

                        {allProjects.length > 0 && (
                          <div style={{ marginTop: 16 }}>
                            <div style={{ fontSize: 11, color: "#7A7365", marginBottom: 6, letterSpacing: 0.5 }}>PROJECTS</div>
                            <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                              {allProjects.map((p) => (<button key={p} onClick={() => toggleProject(p)} className={`chip ${activeProjects.has(p) ? "active" : ""}`}><I.Folder size={11} /> {p}</button>))}
                            </div>
                          </div>
                        )}

                        <div style={{ marginTop: 16 }}>
                          <div style={{ fontSize: 11, color: "#7A7365", marginBottom: 6, letterSpacing: 0.5 }}>CATEGORIES</div>
                          <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                            {allCategories.map((c) => (<button key={c} onClick={() => toggleCategory(c)} className={`chip ${activeCategories.has(c) ? "active" : ""}`}>{c}</button>))}
                          </div>
                        </div>
                      </React.Fragment>
                    )}

                    {hasActiveFilters && (
                      <button onClick={clearFilters} style={{ marginTop: 14, background: "none", border: "none", color: "#A6432F", fontSize: 12, cursor: "pointer", display: "flex", alignItems: "center", gap: 4 }}>
                        <I.X size={12} /> Clear all filters
                      </button>
                    )}
                  </div>
                )}

                {categoryChartData.length > 0 && (
                  <div style={{ background: "#F6F4EE", border: "1px solid #C9C2B2", borderRadius: 10, padding: 18, marginBottom: 18 }}>
                    <div className="serif" style={{ fontSize: 15, marginBottom: 12, fontWeight: 700 }}>Spending by category</div>
                    <div style={{ display: "grid", gap: 8 }}>
                      {categoryChartData.map((d) => (
                        <div key={d.category} style={{ display: "grid", gridTemplateColumns: "110px 1fr 80px", alignItems: "center", gap: 10 }}>
                          <div style={{ fontSize: 12, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{d.category}</div>
                          <div style={{ background: "#E3DFD2", borderRadius: 4, height: 14, overflow: "hidden" }}>
                            <div style={{ width: `${Math.max(4, (d.total / maxCategoryTotal) * 100)}%`, height: "100%", background: categoryColor(d.category, allCategories), borderRadius: 4 }} />
                          </div>
                          <div className="mono" style={{ fontSize: 12, textAlign: "right", fontWeight: 600 }}>{formatMoney(d.total)}</div>
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                {recurringCharges.length > 0 && (
                  <div style={{ background: "#F6F4EE", border: "1px solid #C9C2B2", borderRadius: 10, padding: 18, marginBottom: 18 }}>
                    <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 12, flexWrap: "wrap", gap: 8 }}>
                      <div className="serif" style={{ fontSize: 15, fontWeight: 700, display: "flex", alignItems: "center", gap: 6 }}><I.Repeat size={15} /> Recurring charges</div>
                      <div className="mono" style={{ fontSize: 12, color: "#7A7365" }}>
                        Est. {formatMoney(recurringCharges.reduce((s, r) => s + (r.frequency === "Monthly" ? r.avgAmount : r.estAnnual / 12), 0))} / month
                      </div>
                    </div>
                    <div style={{ display: "grid", gap: 8 }}>
                      {recurringCharges.map((r) => (
                        <div key={r.key} onClick={() => { setSearch(r.description); setShowFilters(false); }} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", background: "#FFFFFF", border: "1px solid #E3DFD2", borderRadius: 8, padding: "10px 14px", cursor: "pointer", gap: 10, flexWrap: "wrap" }}>
                          <div style={{ minWidth: 180 }}>
                            <div style={{ fontSize: 13, fontWeight: 600 }}>{r.description}</div>
                            <div style={{ fontSize: 11, color: "#7A7365", marginTop: 2 }}>{r.frequency} · seen {r.count}× · last {formatDateDisplay(r.lastDate)}{r.card ? ` · ${r.card}` : ""}</div>
                          </div>
                          <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
                            <span className="mono" style={{ fontSize: 14, fontWeight: 600, color: "#A6432F" }}>{formatMoney(r.avgAmount)} <span style={{ fontWeight: 400, color: "#7A7365", fontSize: 11 }}>/ {r.frequency.toLowerCase().replace("ly", "")}</span></span>
                            <span className="mono" style={{ fontSize: 11, color: "#7A7365" }}>≈{formatMoney(r.estAnnual)}/yr</span>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                <TransactionTable transactions={filtered} {...tableProps} showCard />
                <div style={{ fontSize: 11, color: "#7A7365", marginTop: 10, textAlign: "center" }}>
                  Showing {filtered.length} of {transactions.length} transactions · stored only in this browser, never uploaded anywhere
                </div>
              </React.Fragment>
            )}
          </div>

          {showInsights && <InsightsPanel stat={insightsStat} primaryDonut={insightsPrimaryDonut} secondaryDonut={insightsSecondaryDonut} />}
        </div>
      </div>

      {cardPickerRequest && (
        <CardPickerModal
          fileName={cardPickerRequest.fileName}
          onPick={(c) => { cardPickerRequest.resolve({ name: c.name, catalogId: c.id }); setCardPickerRequest(null); }}
          onCustom={(name) => { cardPickerRequest.resolve({ name, catalogId: null }); setCardPickerRequest(null); }}
          onSkip={() => { cardPickerRequest.resolve(null); setCardPickerRequest(null); }}
        />
      )}

      {duplicateReview && (
        <DuplicateReviewModal
          dupItems={duplicateReview.dupItems}
          onConfirm={(kept) => { duplicateReview.resolve(kept); setDuplicateReview(null); }}
          onCancel={() => { duplicateReview.resolve(null); setDuplicateReview(null); }}
        />
      )}

      {showBackToTop && (
        <button
          onClick={() => window.scrollTo({ top: 0, behavior: "smooth" })}
          title="Back to top"
          className="back-to-top-btn"
          style={{
            position: "fixed", bottom: 24, right: 24, width: 46, height: 46, borderRadius: "50%",
            background: "#22303F", color: "#EDEBE3", border: "none", cursor: "pointer",
            display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18,
            boxShadow: "0 4px 14px rgba(0,0,0,0.28)", zIndex: 500,
          }}
        >
          <I.Up size={18} />
        </button>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(error) { return { error }; }
  componentDidCatch(error, info) { console.error("Ledger crashed:", error, info); }
  render() {
    if (this.state.error) {
      return (
        <div style={{ padding: 40, maxWidth: 640, margin: "0 auto", fontFamily: "sans-serif" }}>
          <h2 style={{ color: "#A6432F" }}>Something went wrong</h2>
          <p style={{ color: "#22303F" }}>
            The app hit an error and stopped rendering instead of quietly going blank. Your data in this browser's storage
            is untouched. Please copy the message below and share it so this can be fixed.
          </p>
          <pre style={{ background: "#F6F4EE", border: "1px solid #C9C2B2", borderRadius: 8, padding: 14, fontSize: 12, whiteSpace: "pre-wrap", overflowX: "auto" }}>
            {String(this.state.error && this.state.error.stack || this.state.error)}
          </pre>
          <button
            onClick={() => this.setState({ error: null })}
            style={{ marginTop: 14, background: "#22303F", color: "#EDEBE3", border: "none", borderRadius: 8, padding: "10px 20px", fontWeight: 600, cursor: "pointer" }}
          >Try to continue</button>
        </div>
      );
    }
    return this.props.children;
  }
}

root.render(<ErrorBoundary><LedgerApp /></ErrorBoundary>);
</script>
</body>
</html>

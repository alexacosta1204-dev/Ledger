function canonicalCategory(raw) {
  const s = (raw || "").toLowerCase();
  if (s.includes("restaurant") || s.includes("dining") || s.includes("food & drink") || s.includes("food and drink") || s.includes("fast food") || s.includes("coffee")) return "dining";
  if (s.includes("grocery") || s.includes("groceries") || s.includes("supermarket")) return "grocery";
  if (s.includes("wholesale") || s.includes("warehouse club")) return "wholesale";
  if (s.includes("gas") || s.includes("fuel") || s.includes("automotive") || s.includes("auto ")) return "gas";
  if (s.includes("drug") || s.includes("pharmacy")) return "drugstore";
  if (s.includes("streaming") || s.includes("subscription")) return "streaming";
  if (s.includes("entertainment") || s.includes("movie") || s.includes("recreation")) return "entertainment";
  if (s.includes("transit") || s.includes("parking") || s.includes("toll") || s.includes("rideshare") || s.includes("taxi")) return "transit";
  if (s.includes("travel") || s.includes("airline") || s.includes("hotel") || s.includes("lodging")) return "travel";
  return "other";
}

const CANONICAL_CATEGORIES = [
  { key: "dining", label: "Dining" },
  { key: "grocery", label: "Grocery / supermarkets" },
  { key: "wholesale", label: "Wholesale clubs" },
  { key: "gas", label: "Gas stations" },
  { key: "drugstore", label: "Drugstores" },
  { key: "streaming", label: "Streaming" },
  { key: "entertainment", label: "Entertainment" },
  { key: "transit", label: "Transit" },
  { key: "travel", label: "Travel" },
  { key: "other", label: "Everything else" },
];

function effectiveRate(catalogCard, rateOverrides, key) {
  if (rateOverrides && typeof rateOverrides === "object" && rateOverrides[key] != null) return rateOverrides[key];
  if (catalogCard) {
    const entry = catalogCard.rates.find((r) => r.key === key);
    if (entry) return entry.rate;
    return catalogCard.baseRate;
  }
  if (typeof rateOverrides === "number") return rateOverrides;
  return 1;
}

function estimateCardRewards(cardTxns, catalogCard, rateOverrides) {
  const expenses = cardTxns.filter((t) => t.amount < 0);
  const totalSpend = expenses.reduce((s, t) => s + -t.amount, 0);
  const byCategory = {};
  let totalReward = 0;
  expenses.forEach((t) => {
    const key = canonicalCategory(t.category);
    const rate = effectiveRate(catalogCard, rateOverrides, key);
    const label = (CANONICAL_CATEGORIES.find((c) => c.key === key) || {}).label || key;
    const amt = -t.amount;
    totalReward += amt * (rate / 100);
    if (!byCategory[key]) byCategory[key] = { spend: 0, reward: 0, rate, label, key };
    byCategory[key].spend += amt;
    byCategory[key].reward += amt * (rate / 100);
  });
  const rewardType = catalogCard ? catalogCard.rewardType : "cashback";
  const dollarValue = rewardType === "points" ? totalReward * ((catalogCard.pointValueCents || 1) / 100) : totalReward;
  return { totalSpend, totalReward, dollarValue, byCategory, rewardType };
}

function categoryBreakdownData(txns, allCategoriesList) {
  const totals = {};
  txns.filter((t) => t.amount < 0).forEach((t) => {
    const cat = t.category || "Uncategorized";
    totals[cat] = (totals[cat] || 0) + -t.amount;
  });
  const entries = Object.entries(totals).sort((a, b) => b[1] - a[1]);
  const top = entries.slice(0, 6);
  const otherSum = entries.slice(6).reduce((s, [, v]) => s + v, 0);
  const data = top.map(([cat, val]) => ({ label: cat, value: val, color: categoryColor(cat, allCategoriesList) }));
  if (otherSum > 0) data.push({ label: "Other", value: otherSum, color: "#B0A99A" });
  return data;
}

function cardBreakdownData(txns) {
  const totals = {};

  const top = entries.slice(0, 5);

function pad(n) { return String(n).padStart(2, "0"); }

function parseDateFlexible(raw) {
  if (raw == null) return null;
  const str = String(raw).trim();
  if (!str) return null;
  let m = str.match(/^(\d{4})[-\/](\d{1,2})[-\/](\d{1,2})/);
  if (m) return `${m[1]}-${pad(m[2])}-${pad(m[3])}`;
  m = str.match(/^(\d{1,2})[-\/](\d{1,2})[-\/](\d{2,4})/);
  if (m) {
    let [, mm, dd, yy] = m;
    if (yy.length === 2) yy = (Number(yy) > 50 ? "19" : "20") + yy;
    return `${yy}-${pad(mm)}-${pad(dd)}`;
  }
  const d = new Date(str);
  if (!isNaN(d.getTime())) {
    return `${d.getUTCFullYear()}-${pad(d.getUTCMonth() + 1)}-${pad(d.getUTCDate())}`;
  }
  return null;
}

function parseAmount(raw) {
  if (raw == null) return null;
  let s = String(raw).trim();
  if (!s) return null;
  let neg = false;
  if (/^\(.*\)$/.test(s)) { neg = true; s = s.slice(1, -1); }
  s = s.replace(/[$,\s]/g, "");
  if (s.startsWith("-")) { neg = true; s = s.slice(1); }
  else if (s.startsWith("+")) { s = s.slice(1); }
  const n = parseFloat(s);
  if (isNaN(n)) return null;
  return neg ? -n : n;
}

function detectColumns(fields) {
  const lower = fields.map((f) => f.toLowerCase());
  const find = (...keys) => {
    for (const k of keys) {
      const idx = lower.findIndex((f) => f.includes(k));
      if (idx !== -1) return fields[idx];
    }
    return null;
  };
  return {
    date: find("date"),
    description: find("description", "merchant", "payee", "name", "memo"),
    amount: find("amount"),
    debit: find("debit", "withdrawal"),
    credit: find("credit", "deposit"),
    category: find("category", "type"),
    card: find("card", "account"),
  };
}

// Some issuers (Discover included) export a single Amount column as
// positive = charge, negative = payment/credit — the opposite of this app's
// convention (negative = charge, positive = payment/credit). Detect that by
// checking the sign of rows that look like payments.
function detectSignFlip(rows, cols) {
  if (!cols.amount) return 1;
  let paymentNeg = 0, paymentPos = 0;
  rows.forEach((row) => {
    const desc = `${cols.description ? row[cols.description] : ""} ${cols.category ? row[cols.category] : ""}`.toLowerCase();
    if (desc.includes("payment") || desc.includes("thank you")) {
      const amt = parseAmount(row[cols.amount]);
      if (amt == null) return;
      if (amt < 0) paymentNeg += 1; else if (amt > 0) paymentPos += 1;
    }
  });
  if (paymentNeg > paymentPos && paymentNeg > 0) return -1;
  return 1;
}

function formatMoney(n) {
  const sign = n < 0 ? "-" : "";
  return `${sign}$${Math.abs(n).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
}

function formatDateDisplay(iso) {
  if (!iso) return "—";
  const [y, m, d] = iso.split("-");

function categoryColor(cat, list) {
  const idx = list.indexOf(cat);

function shortMerchantName(desc) {
  if (!desc) return "Unknown";
  const words = desc.trim().split(/\s+/).filter(Boolean);
  const stopPattern = /\d|^[A-Z]{2}$/;
  const picked = [];
  for (let i = 0; i < words.length && picked.length < 2; i++) {
    const w = words[i];
    if (stopPattern.test(w)) {
      if (picked.length === 0) picked.push(w);
      break;
    }
    picked.push(w);
  }
  let name = (picked.join(" ") || words[0] || desc).replace(/[.,]+$/, "");
  name = name.charAt(0).toUpperCase() + name.slice(1).toLowerCase();
  return name || desc;
}

function normalizeDesc(desc) {
  return desc
    .toLowerCase()
    .replace(/[0-9]/g, "")
    .replace(/[^a-z\s]/g, " ")
    .replace(/\s+/g, " ")
    .trim()
    .split(" ")
    .slice(0, 3)
    .join(" ");
}

function daysBetween(isoA, isoB) {
  const a = new Date(isoA + "T00:00:00Z");
  const b = new Date(isoB + "T00:00:00Z");
  return Math.round((b - a) / 86400000);
}

function detectRecurring(transactions) {
  const groups = {};
  transactions.filter((t) => t.amount < 0).forEach((t) => {
    const key = normalizeDesc(t.description) || t.description.toLowerCase();
    if (!groups[key]) groups[key] = [];
    groups[key].push(t);
  });

  const results = [];
  Object.values(groups).forEach((txns) => {
    if (txns.length < 2) return;
    const sorted = txns.slice().sort((a, b) => a.date.localeCompare(b.date));
    const intervals = [];
    for (let i = 1; i < sorted.length; i++) intervals.push(daysBetween(sorted[i - 1].date, sorted[i].date));
    const avgInterval = intervals.reduce((a, b) => a + b, 0) / intervals.length;
    const amounts = sorted.map((t) => Math.abs(t.amount));
    const avgAmount = amounts.reduce((a, b) => a + b, 0) / amounts.length;
    const amountsConsistent = amounts.every((a) => Math.abs(a - avgAmount) / avgAmount < 0.15);

    let frequency = null, timesPerYear = 0;
    if (avgInterval >= 6 && avgInterval <= 8) { frequency = "Weekly"; timesPerYear = 52; }
    else if (avgInterval >= 25 && avgInterval <= 35) { frequency = "Monthly"; timesPerYear = 12; }
    else if (avgInterval >= 85 && avgInterval <= 96) { frequency = "Quarterly"; timesPerYear = 4; }
    else if (avgInterval >= 350 && avgInterval <= 380) { frequency = "Yearly"; timesPerYear = 1; }

    if (frequency && amountsConsistent) {
      const last = sorted[sorted.length - 1];
      results.push({
        key: last.description, description: last.description, card: last.card,
        frequency, avgAmount, count: sorted.length, lastDate: last.date, estAnnual: avgAmount * timesPerYear,
      });
    }
  });

  return results.sort((a, b) => b.estAnnual - a.estAnnual);
}

// ---------- PDF statement support (best effort) ----------
// PDFs don't have real columns, so this reconstructs text lines from item
// positions on the page, then looks for a "date ... description ... amount"
// pattern per line. Layouts vary a lot between issuers, so this won't catch
// everything — anything it misses just won't import, nothing corrupts.
let pdfjsReadyPromise = null;
function ensurePdfJs() {
  if (pdfjsReadyPromise) return pdfjsReadyPromise;
  pdfjsReadyPromise = new Promise((resolve, reject) => {
    if (window.pdfjsLib) { resolve(window.pdfjsLib); return; }
    const script = document.createElement("script");
    script.src = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js";
    script.onload = () => {
      try {
        window.pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
        resolve(window.pdfjsLib);
      } catch (e) { reject(e); }
    };
    script.onerror = () => reject(new Error("Couldn't load PDF support — check your internet connection and try again."));
    document.head.appendChild(script);
  });
  return pdfjsReadyPromise;
}

async function extractPdfLines(file) {
  const pdfjsLib = await ensurePdfJs();
  const arrayBuffer = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
  const lines = [];
  for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
    const page = await pdf.getPage(pageNum);
    const content = await page.getTextContent();
    const rows = {};
    content.items.forEach((item) => {
      const y = Math.round(item.transform[5]);
      if (!rows[y]) rows[y] = [];
      rows[y].push({ x: item.transform[4], str: item.str });
    });
    Object.keys(rows).map(Number).sort((a, b) => b - a).forEach((y) => {
      const lineText = rows[y].sort((a, b) => a.x - b.x).map((i) => i.str).join(" ").replace(/\s+/g, " ").trim();
      if (lineText) lines.push(lineText);
    });
  }
  return lines;
}

function inferStatementYear(lines) {
  const joined = lines.join(" ");
  const fullDate = joined.match(/\b\d{1,2}\/\d{1,2}\/(\d{4})\b/);
  if (fullDate) return fullDate[1];
  const bareYear = joined.match(/\b(20\d{2})\b/);
  if (bareYear) return bareYear[1];
  return String(new Date().getFullYear());
}

const PDF_LINE_RE = /^(\d{1,2}\/\d{1,2}(?:\/\d{2,4})?)\s+(?:\d{1,2}\/\d{1,2}(?:\/\d{2,4})?\s+)?(.+?)\s+(\(?\$?-?[\d,]+\.\d{2}\)?)\s*$/;

// Bank/checking statements group transactions under section headers rather than
// marking each line with a sign or keyword — these patterns catch the common ones.
const PDF_POSITIVE_SECTION_RE = /(deposits? and other additions|payments? and other credits|other credits|interest earned|deposits & credits)/i;
const PDF_NEGATIVE_SECTION_RE = /(withdrawals? and other subtractions|other subtractions|checks paid|checks and substitute checks|service fees|atm and debit card subtractions|purchases and adjustments|^purchases$|fees charged|interest charged|cash advances|debit card purchases|electronic (?:withdrawals|payments))/i;

async function parsePdfTransactions(file) {
  const lines = await extractPdfLines(file);
  const defaultYear = inferStatementYear(lines);
  const results = [];
  let sectionSign = null;
  lines.forEach((line) => {
    const trimmed = line.trim();
    if (!trimmed) return;
    const looksLikeTxn = PDF_LINE_RE.test(trimmed);
    if (!looksLikeTxn) {
      if (PDF_POSITIVE_SECTION_RE.test(trimmed)) sectionSign = 1;
      else if (PDF_NEGATIVE_SECTION_RE.test(trimmed)) sectionSign = -1;
      return;
    }
    if (/^total\b/i.test(trimmed)) return;

    const m = trimmed.match(PDF_LINE_RE);
    if (!m) return;
    let [, rawDate, rawDesc, rawAmount] = m;
    if (rawDate.split("/").length === 2) rawDate = `${rawDate}/${defaultYear}`;
    const dateIso = parseDateFlexible(rawDate);
    const magnitude = Math.abs(parseAmount(rawAmount) || 0);
    const desc = rawDesc.trim();
    if (!dateIso || !magnitude || !desc) return;

    let amount;
    if (sectionSign != null) {
      amount = sectionSign * magnitude;
    } else {
      const paymentLike = /payment|thank you|\bcredit\b/i.test(desc);
      amount = paymentLike ? magnitude : -magnitude;
    }
    results.push({ date: dateIso, description: desc, amount });
  });
  return results;
}

function DonutChart({ data, size = 128, thickness = 16, onSegmentClick }) {
  const [hoverIdx, setHoverIdx] = useState(null);
  const total = data.reduce((s, d) => s + d.value, 0);
  const r = (size - thickness) / 2, cx = size / 2, cy = size / 2, circumference = 2 * Math.PI * r;
  if (!total) {
    return <svg width={size} height={size}><circle cx={cx} cy={cy} r={r} fill="none" stroke="#E3DFD2" strokeWidth={thickness} /></svg>;
  }
  let cumulative = 0;
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      <circle cx={cx} cy={cy} r={r} fill="none" stroke="#E3DFD2" strokeWidth={thickness} />
      {data.map((d, i) => {
        const frac = d.value / total;
        const dash = frac * circumference;
        const offset = -cumulative * circumference;
        cumulative += frac;
        const clickable = !!onSegmentClick && d.label !== "Other";
        return (
          <circle
            key={i} cx={cx} cy={cy} r={r} fill="none" stroke={d.color}
            strokeWidth={hoverIdx === i ? thickness + 4 : thickness}
            strokeDasharray={`${dash} ${circumference - dash}`} strokeDashoffset={offset}
            transform={`rotate(-90 ${cx} ${cy})`}
            style={{
              cursor: clickable ? "pointer" : "default", transition: "stroke-width 0.12s, opacity 0.12s",
              opacity: hoverIdx == null || hoverIdx === i ? 1 : 0.5,
            }}
            onMouseEnter={() => clickable && setHoverIdx(i)}
            onMouseLeave={() => setHoverIdx((h) => (h === i ? null : h))}
            onClick={() => clickable && onSegmentClick(d.label)}
          >
            <title>{clickable ? `${d.label} — click to view these transactions` : d.label}</title>
          </circle>
        );
      })}
    </svg>
  );
}

function formatISO(d) { return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`; }

function CalendarPopup({ initialStart, initialEnd, onApply, onClose }) {
  const today = new Date();
  const [viewYear, setViewYear] = useState(initialStart ? parseInt(initialStart.slice(0, 4)) : today.getFullYear());
  const [viewMonth, setViewMonth] = useState(initialStart ? parseInt(initialStart.slice(5, 7)) - 1 : today.getMonth());
  const [mode, setMode] = useState("start");
  const [start, setStart] = useState(initialStart || "");
  const [end, setEnd] = useState(initialEnd || "");

  const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
  const firstDow = new Date(viewYear, viewMonth, 1).getDay();
  const cells = [];
  for (let i = 0; i < firstDow; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);

  const pickDay = (d) => {
    const iso = `${viewYear}-${pad(viewMonth + 1)}-${pad(d)}`;
    if (mode === "start") {
      setStart(iso); setEnd(""); setMode("end");
    } else {
      let s = start, e = iso;
      if (e < s) { const tmp = s; s = e; e = tmp; }
      setStart(s); setEnd(e);
      onApply(s, e);
    }
  };

  const prevMonth = () => { if (viewMonth === 0) { setViewMonth(11); setViewYear(viewYear - 1); } else setViewMonth(viewMonth - 1); };
  const nextMonth = () => { if (viewMonth === 11) { setViewMonth(0); setViewYear(viewYear + 1); } else setViewMonth(viewMonth + 1); };
  const monthName = new Date(viewYear, viewMonth, 1).toLocaleString(undefined, { month: "long" });

  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(20,24,28,0.45)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 1000 }} onClick={onClose}>
      <div style={{ background: "#EDEBE3", borderRadius: 14, padding: 20, width: 300 }} onClick={(e) => e.stopPropagation()}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
          <button onClick={prevMonth} style={{ background: "none", border: "none", cursor: "pointer", fontSize: 16 }}>‹</button>
          <div style={{ fontWeight: 600, fontSize: 14 }}>{monthName} {viewYear}</div>
          <button onClick={nextMonth} style={{ background: "none", border: "none", cursor: "pointer", fontSize: 16 }}>›</button>
        </div>
        <div style={{ fontSize: 11, color: "#7A7365", marginBottom: 8, textAlign: "center" }}>
          {mode === "start" ? "Click a start date" : "Now click an end date"}
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 4, fontSize: 11, textAlign: "center", marginBottom: 4, color: "#7A7365" }}>
          {["S", "M", "T", "W", "T", "F", "S"].map((d, i) => <div key={i}>{d}</div>)}
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 4 }}>
          {cells.map((d, i) => {
            if (d == null) return <div key={i} />;
            const iso = `${viewYear}-${pad(viewMonth + 1)}-${pad(d)}`;
            const isStart = iso === start, isEnd = iso === end;
            const inRange = start && end && iso > start && iso < end;
            return (
              <div
                key={i} onClick={() => pickDay(d)}
                style={{
                  textAlign: "center", padding: "5px 0", borderRadius: 6, cursor: "pointer", fontSize: 12,
                  background: isStart || isEnd ? "#22303F" : inRange ? "#C9C2B233" : "transparent",
                  color: isStart || isEnd ? "#EDEBE3" : "#22303F",
                }}
              >{d}</div>
            );
          })}
        </div>
        <div style={{ display: "flex", justifyContent: "space-between", marginTop: 14 }}>
          <button className="chip" onClick={() => { setStart(""); setEnd(""); setMode("start"); }}>Reset</button>
          <button className="chip" onClick={onClose}>Cancel</button>
        </div>
      </div>
    </div>
  );
}

function DateRangeControl({ startDate, endDate, onChange }) {
  const [showCalendar, setShowCalendar] = useState(false);
  const applyPreset = (preset) => {
    const now = new Date();
    let start = null, end = null;
    if (preset === "30") { start = new Date(now); start.setDate(start.getDate() - 30); end = now; }
    else if (preset === "60") { start = new Date(now); start.setDate(start.getDate() - 60); end = now; }
    else if (preset === "ytd") { start = new Date(now.getFullYear(), 0, 1); end = now; }
    else if (preset === "all") { onChange("", ""); return; }
    onChange(formatISO(start), formatISO(end));

  const isAll = !startDate && !endDate;
  return (
    <div style={{ display: "flex", flexWrap: "wrap", gap: 6, alignItems: "center" }}>

}

        Set your own cash back / points rate per category for this card — use this if your CSV's category text doesn't line up

      </div>

              type="number" step="0.1" className="ledger-input" style={{ width: 64, padding: "4px 6px" }}
              value={vals[c.key]} onChange={(e) => setVals({ ...vals, [c.key]: parseFloat(e.target.value) || 0 })}

          </div>
        ))}

}

const th = { padding: "10px 14px", fontSize: 11, letterSpacing: 0.5, color: "#7A7365", fontWeight: 600 };
const td = { padding: "10px 14px" };

function TagsEditor({ t, onSave, onCancel }) {
  const [tagsText, setTagsText] = useState((t.tags || []).join(", "));
  const [projText, setProjText] = useState((t.projects || []).join(", "));
  const commit = () => {
    const tags = tagsText.split(",").map((s) => s.trim()).filter(Boolean);
    const projects = projText.split(",").map((s) => s.trim()).filter(Boolean);
    onSave(tags, projects);
  };
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 6, minWidth: 200 }} onClick={(e) => e.stopPropagation()}>
      <input
        autoFocus className="ledger-input" style={{ padding: "4px 8px", fontSize: 11 }}
        placeholder="Tags, comma separated (e.g. Chicago, Vacation)"
        value={tagsText} onChange={(e) => setTagsText(e.target.value)}
        onKeyDown={(e) => { if (e.key === "Enter") commit(); if (e.key === "Escape") onCancel(); }}
      />
      <input
        className="ledger-input" style={{ padding: "4px 8px", fontSize: 11 }}
        placeholder="Project(s), comma separated (e.g. Chicken Coop)"
        value={projText} onChange={(e) => setProjText(e.target.value)}
        onKeyDown={(e) => { if (e.key === "Enter") commit(); if (e.key === "Escape") onCancel(); }}
      />
      <div style={{ display: "flex", gap: 6 }}>
        <button className="chip" style={{ fontSize: 10, padding: "3px 10px" }} onClick={commit}>Save</button>
        <button className="chip" style={{ fontSize: 10, padding: "3px 10px" }} onClick={onCancel}>Cancel</button>
      </div>
    </div>
  );
}

function TagsCell({ t, isEditing, onStartEdit, onSave, onCancel }) {
  if (isEditing) return <TagsEditor t={t} onSave={onSave} onCancel={onCancel} />;
  const tags = t.tags || [];
  const projects = t.projects || [];
  if (tags.length === 0 && projects.length === 0) {
    return <span onClick={onStartEdit} style={{ cursor: "pointer", fontSize: 11, color: "#B0A99A" }}>+ Add</span>;
  }
  return (
    <div onClick={onStartEdit} style={{ cursor: "pointer", display: "flex", flexWrap: "wrap", gap: 4, maxWidth: 220 }}>
      {tags.map((tag) => (
        <span key={"t" + tag} style={{ fontSize: 10, padding: "2px 7px", borderRadius: 999, background: "#3F5A7322", color: "#3F5A73" }}>{tag}</span>
      ))}
      {projects.map((p) => (
        <span key={"p" + p} style={{ fontSize: 10, padding: "2px 7px", borderRadius: 999, background: "#C98A3E22", color: "#C98A3E", fontWeight: 600, display: "inline-flex", alignItems: "center", gap: 3 }}>
          <I.Folder size={8} /> {p}
        </span>
      ))}
    </div>
  );
}

function BulkActionBar({ count, categories, allTags, onApply, onAddTags, onFlipSign, onClear }) {
  const [catVal, setCatVal] = useState("");
  const [tagsVal, setTagsVal] = useState("");
  const [projVal, setProjVal] = useState("");
  const commitCat = () => {
    const v = catVal.trim();
    if (v) { onApply(v); setCatVal(""); }
  };
  const commitTags = () => {
    const tags = tagsVal.split(",").map((s) => s.trim()).filter(Boolean);
    const projects = projVal.split(",").map((s) => s.trim()).filter(Boolean);
    if (tags.length || projects.length) { onAddTags(tags, projects); setTagsVal(""); setProjVal(""); }
  };
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 8, background: "#22303F", color: "#EDEBE3", borderRadius: 10, padding: "10px 16px", marginBottom: 12 }}>
      <div style={{ display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap" }}>
        <span style={{ fontSize: 13, fontWeight: 600 }}>{count} selected</span>
        <input
          list="bulk-category-options" className="ledger-input" style={{ width: 180, background: "#EDEBE3" }}
          placeholder="Set category to…" value={catVal} onChange={(e) => setCatVal(e.target.value)}
          onKeyDown={(e) => { if (e.key === "Enter") commitCat(); }}
        />
        <datalist id="bulk-category-options">{categories.map((c) => <option key={c} value={c} />)}</datalist>
        <button className="chip" onClick={commitCat}>Apply category</button>
        <button className="chip" onClick={onFlipSign} title="Swap charge/payment sign on just the selected rows">
          <I.Repeat size={11} /> Flip sign
        </button>
        <button onClick={onClear} style={{ marginLeft: "auto", background: "none", border: "none", color: "#EDEBE3", cursor: "pointer", fontSize: 12, opacity: 0.85 }}>
          Clear selection
        </button>
      </div>
      <div style={{ display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap" }}>
        <input
          list="bulk-tag-options" className="ledger-input" style={{ width: 180, background: "#EDEBE3" }}
          placeholder="Add tags (comma sep)…" value={tagsVal} onChange={(e) => setTagsVal(e.target.value)}
          onKeyDown={(e) => { if (e.key === "Enter") commitTags(); }}
        />
        <datalist id="bulk-tag-options">{allTags.map((t) => <option key={t} value={t} />)}</datalist>
        <input
          className="ledger-input" style={{ width: 180, background: "#EDEBE3" }}
          placeholder="Add project(s)…" value={projVal} onChange={(e) => setProjVal(e.target.value)}
          onKeyDown={(e) => { if (e.key === "Enter") commitTags(); }}
        />
        <button className="chip" onClick={commitTags}>Add tags / project</button>
      </div>
    </div>
  );
}

function SortableTh({ label, field, sortBy, sortDir, onSort, align, extraStyle }) {
  const active = sortBy === field;
  return (
    <th style={{ ...th, textAlign: align || "left", cursor: "pointer", userSelect: "none", ...extraStyle }} onClick={() => onSort(field)}>
      {label} <span style={{ opacity: active ? 1 : 0.25 }}>{active ? (sortDir === "asc" ? "↑" : "↓") : "↕"}</span>
    </th>
  );
}

function TransactionTable({ transactions, allCategories, editingCatId, setEditingCatId, updateCategory, deleteTransaction, editingTagsId, setEditingTagsId, updateTags, selectedIds, toggleSelect, toggleSelectAll, showCard = true }) {
  const [sortBy, setSortBy] = useState("date");
  const [sortDir, setSortDir] = useState("desc");
  const handleSort = (field) => {
    if (sortBy === field) { setSortDir((d) => (d === "asc" ? "desc" : "asc")); return; }
    setSortBy(field);
    setSortDir(field === "description" ? "asc" : "desc");
  };
  const sorted = useMemo(() => {
    const list = transactions.slice();
    list.sort((a, b) => {
      let cmp = 0;
      if (sortBy === "date") cmp = (a.date || "").localeCompare(b.date || "");
      else if (sortBy === "amount") cmp = a.amount - b.amount;
      else if (sortBy === "description") cmp = (a.description || "").localeCompare(b.description || "");
      return sortDir === "asc" ? cmp : -cmp;
    });
    return list;
  }, [transactions, sortBy, sortDir]);
  const visibleIds = sorted.map((t) => t.id);
  const allVisibleSelected = visibleIds.length > 0 && visibleIds.every((id) => selectedIds.has(id));
  return (
    <div style={{ background: "#F6F4EE", border: "1px solid #C9C2B2", borderRadius: 10, overflow: "hidden" }}>
      <div style={{ overflowX: "auto" }}>
        <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
          <thead>
            <tr style={{ borderBottom: "1px solid #C9C2B2", textAlign: "left" }}>
              <th style={{ ...th, width: 32 }}>
                <input type="checkbox" checked={allVisibleSelected} onChange={() => toggleSelectAll(visibleIds)} />
              </th>
              <SortableTh label="Date" field="date" sortBy={sortBy} sortDir={sortDir} onSort={handleSort} />
              <SortableTh label="Description" field="description" sortBy={sortBy} sortDir={sortDir} onSort={handleSort} />
              {showCard && <th style={th}>Card</th>}
              <th style={th}>Category</th>
              <th style={th}>Tags</th>
              <SortableTh label="Amount" field="amount" sortBy={sortBy} sortDir={sortDir} onSort={handleSort} align="right" />
              <th style={{ ...th, width: 36 }}></th>
            </tr>
          </thead>
          <tbody>
            {sorted.length === 0 ? (
              <tr><td colSpan={showCard ? 8 : 7} style={{ padding: 28, textAlign: "center", color: "#7A7365" }}>No transactions match these filters.</td></tr>
            ) : sorted.map((t) => (
              <tr key={t.id} className="row-hover" style={{ borderBottom: "1px solid #E3DFD2", background: selectedIds.has(t.id) ? "#22303F0D" : undefined }}>
                <td style={{ ...td, textAlign: "center" }}>
                  <input type="checkbox" checked={selectedIds.has(t.id)} onChange={() => toggleSelect(t.id)} />
                </td>
                <td className="mono" style={td}>{formatDateDisplay(t.date)}</td>
                <td style={td}>{t.description || "(no description)"}</td>
                {showCard && <td style={{ ...td, fontSize: 12, color: "#7A7365" }}>{t.card || "Unlabeled"}</td>}
                <td style={td}>
                  {editingCatId === t.id ? (
                    <input
                      autoFocus className="ledger-input" style={{ padding: "4px 8px", fontSize: 12 }}
                      defaultValue={t.category}
                      onBlur={(e) => updateCategory(t.id, e.target.value.trim())}
                      onKeyDown={(e) => { if (e.key === "Enter") e.target.blur(); if (e.key === "Escape") setEditingCatId(null); }}
                    />
                  ) : (
                    <span
                      onClick={() => setEditingCatId(t.id)}
                      style={{
                        cursor: "pointer", fontSize: 11, padding: "3px 9px", borderRadius: 999,
                        background: categoryColor(t.category, allCategories) + "22",
                        color: categoryColor(t.category, allCategories), fontWeight: 600,
                      }}
                    >{t.category}</span>
                  )}
                </td>
                <td style={td}>
                  <TagsCell
                    t={t} isEditing={editingTagsId === t.id}
                    onStartEdit={() => setEditingTagsId(t.id)}
                    onSave={(tags, projects) => { updateTags(t.id, tags, projects); setEditingTagsId(null); }}
                    onCancel={() => setEditingTagsId(null)}
                  />
                </td>
                <td className="mono" style={{ ...td, textAlign: "right", color: t.amount < 0 ? "#A6432F" : "#2F6F5E", fontWeight: 600 }}>{formatMoney(t.amount)}</td>
                <td style={{ ...td, textAlign: "center" }}>
                  <button onClick={() => deleteTransaction(t.id)} style={{ background: "none", border: "none", cursor: "pointer", color: "#B0A99A" }}>
                    <I.Trash size={14} />
                  </button>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ---------- Cards page ----------
function CardsPage({ transactions, allCategories, editingCatId, setEditingCatId, updateCategory, deleteTransaction, editingTagsId, setEditingTagsId, updateTags, selectedIds, toggleSelect, toggleSelectAll, flipCardSigns, fixPaymentSigns, selected, setSelected }) {
  const cardGroups = useMemo(() => {
    const map = {};
    transactions.forEach((t) => {
      const name = t.card || "Unlabeled";
      if (!map[name]) map[name] = { name, catalogId: t.cardCatalogId || null, count: 0, charges: 0, payments: 0, files: new Set() };
      map[name].count += 1;
      if (t.amount < 0) map[name].charges += -t.amount; else map[name].payments += t.amount;
      map[name].files.add(t.source || "unknown file");
    });
    return Object.values(map).sort((a, b) => b.charges - a.charges);
  }, [transactions]);

  if (selected && cardGroups.find((g) => g.name === selected)) {
    const group = cardGroups.find((g) => g.name === selected);
    const cardTxns = transactions.filter((t) => (t.card || "Unlabeled") === selected).sort((a, b) => b.date.localeCompare(a.date));
    const fileGroups = {};
    cardTxns.forEach((t) => {
      const f = t.source || "unknown file";
      if (!fileGroups[f]) fileGroups[f] = { count: 0, minDate: t.date, maxDate: t.date };
      fileGroups[f].count += 1;
      if (t.date < fileGroups[f].minDate) fileGroups[f].minDate = t.date;
      if (t.date > fileGroups[f].maxDate) fileGroups[f].maxDate = t.date;
    });
    const catalogCard = CARD_CATALOG.find((c) => c.id === group.catalogId);

    return (
      <div>
        <button onClick={() => setSelected(null)} className="chip" style={{ marginBottom: 18 }}><I.Back size={12} /> All cards</button>
        <div style={{ display: "flex", gap: 16, alignItems: "center", marginBottom: 10, flexWrap: "wrap" }}>
          {catalogCard ? <CardVisual card={catalogCard} /> : <CardVisual card={{ name: selected, network: "Card", colorFrom: "#5A5A5A", colorTo: "#333" }} />}
          <div>
            <div className="serif" style={{ fontSize: 20, fontWeight: 700 }}>{selected}</div>
            <div style={{ fontSize: 12, color: "#7A7365", marginTop: 2 }}>
              {group.count} transactions · {formatMoney(group.charges)} in charges · {formatMoney(group.payments)} in payments/credits
            </div>
          </div>
        </div>
        <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 22 }}>
          <button
            className="chip" style={{ fontSize: 11 }}
            onClick={() => flipCardSigns(selected)}
            title="Use this if EVERY charge and payment on this card looks swapped"
          >
            <I.Repeat size={11} /> All charges/payments swapped? Flip everything
          </button>
          <button
            className="chip" style={{ fontSize: 11 }}
            onClick={() => fixPaymentSigns(selected)}
            title='Use this if only rows containing "payment" or "thank you" are showing as negative charges instead of positive payments'
          >
            <I.Repeat size={11} /> Only payments look wrong? Fix just those rows
          </button>
        </div>

        <div className="serif" style={{ fontSize: 14, fontWeight: 700, marginBottom: 8 }}>Imported files</div>
        <div style={{ display: "grid", gap: 8, marginBottom: 26 }}>
          {Object.entries(fileGroups).map(([f, info]) => (
            <div key={f} style={{ background: "#F6F4EE", border: "1px solid #C9C2B2", borderRadius: 8, padding: "10px 14px", display: "flex", justifyContent: "space-between", flexWrap: "wrap", gap: 6, fontSize: 13 }}>
              <span>{f}</span>
              <span style={{ color: "#7A7365", fontSize: 12 }}>{info.count} transactions · {formatDateDisplay(info.minDate)} – {formatDateDisplay(info.maxDate)}</span>
            </div>
          ))}
        </div>

        <div className="serif" style={{ fontSize: 14, fontWeight: 700, marginBottom: 8 }}>Transactions</div>
        <TransactionTable
          transactions={cardTxns} allCategories={allCategories} editingCatId={editingCatId}
          setEditingCatId={setEditingCatId} updateCategory={updateCategory} deleteTransaction={deleteTransaction}
          editingTagsId={editingTagsId} setEditingTagsId={setEditingTagsId} updateTags={updateTags}
          selectedIds={selectedIds} toggleSelect={toggleSelect} toggleSelectAll={toggleSelectAll} showCard={false}
        />
      </div>
    );
  }

  return (
    <div>
      <div className="serif" style={{ fontSize: 20, fontWeight: 700, marginBottom: 16 }}>Your cards</div>
      {cardGroups.length === 0 ? (
        <div style={{ color: "#7A7365", fontSize: 14 }}>Upload a CSV to see your cards here.</div>
      ) : (
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(200px, 1fr))", gap: 16 }}>
          {cardGroups.map((g) => {
            const catalogCard = CARD_CATALOG.find((c) => c.id === g.catalogId);
            return (
              <div
                key={g.name} onClick={() => setSelected(g.name)}
                style={{ cursor: "pointer", background: "#F6F4EE", border: "1px solid #C9C2B2", borderRadius: 12, padding: 16, display: "flex", flexDirection: "column", gap: 10 }}
              >
                {catalogCard ? <CardVisual card={catalogCard} width={"100%"} height={90} /> : <CardVisual card={{ name: g.name, network: "Card", colorFrom: "#5A5A5A", colorTo: "#333" }} width={"100%"} height={90} />}
                <div style={{ fontSize: 13, fontWeight: 600 }}>{g.name}</div>
                <div style={{ fontSize: 11, color: "#7A7365" }}>{g.count} transactions · {g.files.size} file{g.files.size === 1 ? "" : "s"}</div>
                <div className="mono" style={{ fontSize: 13, fontWeight: 600, color: "#A6432F" }}>{formatMoney(g.charges)} charged</div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ---------- Projects page ----------
function ProjectsPage({ transactions, allCategories, editingCatId, setEditingCatId, updateCategory, deleteTransaction, editingTagsId, setEditingTagsId, updateTags, selectedIds, toggleSelect, toggleSelectAll }) {
  const [selected, setSelected] = useState(null);

  const projectGroups = useMemo(() => {
    const map = {};
    transactions.forEach((t) => {
      (t.projects || []).forEach((p) => {
        if (!map[p]) map[p] = { name: p, count: 0, spend: 0 };
        map[p].count += 1;
        if (t.amount < 0) map[p].spend += -t.amount;
      });
    });
    return Object.values(map).sort((a, b) => b.spend - a.spend);
  }, [transactions]);

  if (selected) {
    const txns = transactions.filter((t) => (t.projects || []).includes(selected)).sort((a, b) => b.date.localeCompare(a.date));
    const spend = txns.reduce((s, t) => (t.amount < 0 ? s + -t.amount : s), 0);
    return (
      <div>
        <button onClick={() => setSelected(null)} className="chip" style={{ marginBottom: 18 }}><I.Back size={12} /> All projects</button>
        <div className="serif" style={{ fontSize: 20, fontWeight: 700, marginBottom: 4 }}>{selected}</div>
        <div style={{ fontSize: 12, color: "#7A7365", marginBottom: 20 }}>{txns.length} transactions · {formatMoney(spend)} spent</div>
        <TransactionTable
          transactions={txns} allCategories={allCategories} editingCatId={editingCatId} setEditingCatId={setEditingCatId}
          updateCategory={updateCategory} deleteTransaction={deleteTransaction}
          editingTagsId={editingTagsId} setEditingTagsId={setEditingTagsId} updateTags={updateTags}
          selectedIds={selectedIds} toggleSelect={toggleSelect} toggleSelectAll={toggleSelectAll} showCard
        />
      </div>
    );
  }

  return (
    <div>
      <div className="serif" style={{ fontSize: 20, fontWeight: 700, marginBottom: 6 }}>Projects</div>
      <p style={{ fontSize: 13, color: "#7A7365", marginBottom: 18, maxWidth: 600 }}>
        Tag any transaction with a project — like "Chicken Coop" or "Kitchen Remodel" — to track what it costs across every card and statement. Projects show up here automatically.
      </p>
      {projectGroups.length === 0 ? (
        <div style={{ color: "#7A7365", fontSize: 14 }}>No projects yet — open a transaction's Tags cell on the Dashboard and add a project to get started.</div>
      ) : (
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(200px, 1fr))", gap: 16 }}>
          {projectGroups.map((p) => (
            <div key={p.name} onClick={() => setSelected(p.name)} style={{ cursor: "pointer", background: "#F6F4EE", border: "1px solid #C9C2B2", borderRadius: 12, padding: 18, display: "flex", flexDirection: "column", gap: 8 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                <span style={{ width: 32, height: 32, borderRadius: 8, background: "#C98A3E22", display: "flex", alignItems: "center", justifyContent: "center", color: "#C98A3E" }}><I.Folder size={16} /></span>
                <div style={{ fontSize: 14, fontWeight: 700 }}>{p.name}</div>
              </div>
              <div style={{ fontSize: 11, color: "#7A7365" }}>{p.count} transaction{p.count === 1 ? "" : "s"}</div>
              <div className="mono" style={{ fontSize: 16, fontWeight: 700, color: "#A6432F" }}>{formatMoney(p.spend)}</div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}
